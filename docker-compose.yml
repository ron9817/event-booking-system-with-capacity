services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./event-booking-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/event_booking?schema=public"
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: "http://localhost:8080"
      SEED_DATABASE: "true"
    ports:
      - "3000:3000"
    volumes:
      - backend-data:/app/.data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./event-booking-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend-data:
